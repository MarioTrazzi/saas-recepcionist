version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: receptionist
      POSTGRES_PASSWORD: receptionist
      POSTGRES_DB: receptionist
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  evolution-api:
    image: atendai/evolution-api:v2.2.3
    restart: always
    ports:
      - '8080:8080'
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: saas-local-key-2024
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://receptionist:receptionist@postgres:5432/evolution
      DATABASE_CONNECTION_URI: postgresql://receptionist:receptionist@postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: 'true'
      DATABASE_SAVE_DATA_NEW_MESSAGE: 'false'
      DATABASE_SAVE_MESSAGE_UPDATE: 'false'
      DATABASE_SAVE_DATA_CONTACTS: 'false'
      DATABASE_SAVE_DATA_CHATS: 'false'
      CACHE_REDIS_ENABLED: 'false'
      LOG_LEVEL: ERROR
      DEL_INSTANCE: 'false'
      # Force latest WhatsApp Web version — the default bundled version is outdated
      # and causes WhatsApp to reject connections with <failure reason="405">
      CONFIG_SESSION_PHONE_VERSION: '2.3000.1035194821'
    depends_on:
      - postgres
    volumes:
      - evolution_instances:/evolution/instances

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://receptionist:receptionist@postgres:5432/receptionist
      REDIS_URL: redis://redis:6379
      EVOLUTION_API_URL: http://evolution-api:8080
    ports:
      - '3001:3001'
    depends_on:
      - postgres
      - redis
      - evolution-api
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:3001
    ports:
      - '5173:5173'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
  evolution_instances:
