server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    error_log /dev/null crit;
    access_log off;

    # API — proxy para o backend
    location /api/ {
        proxy_pass https://backend-production-e05e.up.railway.app;
        proxy_ssl_server_name on;
        proxy_set_header Host backend-production-e05e.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA — redireciona qualquer rota para o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets com hash no nome
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
}
